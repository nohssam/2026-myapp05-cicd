# ===========================================
# Nginx 설정 파일 (React SPA용)
# - React Router의 클라이언트 사이드 라우팅 지원
# - 모든 경로를 index.html로 리다이렉트
# ===========================================

server {
    listen 80;
    # - 80번 포트에서 HTTP 요청 수신
    # - HTTPS가 필요하면 443 포트 + SSL 설정 추가

    server_name _;
    # - 모든 호스트명 허용 (와일드카드)
    # - 특정 도메인만 허용하려면: server_name example.com;

    root /usr/share/nginx/html;
    # - 정적 파일 루트 디렉토리
    # - React 빌드 결과물이 복사된 위치

    index index.html;
    # - 기본 인덱스 파일

    location / {
        try_files $uri $uri/ /index.html;
        # - React Router SPA를 위한 핵심 설정
        # - 1순위: 요청된 파일이 존재하면 반환 ($uri)
        # - 2순위: 요청된 디렉토리가 존재하면 반환 ($uri/)
        # - 3순위: 둘 다 없으면 index.html 반환 (/index.html)
        # - 이를 통해 /profile, /memo 등 클라이언트 라우트가 동작
    }
}
