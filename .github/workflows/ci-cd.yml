# ===========================================
# GitHub Actions CI/CD 파이프라인
# - main 브랜치에 push 시 자동으로 실행
# - Docker 이미지 빌드 → DockerHub 푸시 → AWS EC2 배포
# ===========================================

name: React.js CI/CD
# - 워크플로우 이름 (GitHub Actions 탭에서 표시됨)

# ===========================================
# 트리거 설정: 언제 이 워크플로우가 실행되는가?
# ===========================================
on:
    push:
        branches:
            - main
# - main 브랜치에 push될 때만 실행
# - PR 머지, 직접 push 모두 포함

# ===========================================
# Jobs: 실행할 작업 정의
# ===========================================
jobs:
    build-and-deploy:
        # Job 이름: build-and-deploy

        runs-on: ubuntu-latest
        # - GitHub에서 제공하는 Ubuntu 최신 버전 러너에서 실행
        # - 무료 계정: 월 2,000분 제공

        steps:
            # -----------------------------------------
            # Step 1: 코드 체크아웃
            # -----------------------------------------
            - name: Checkout code
              uses: actions/checkout@v3
              # - GitHub 저장소의 코드를 러너(실행 환경)로 복사
              # - actions/checkout은 GitHub 공식 액션
              # - 모든 워크플로우에서 가장 먼저 실행되어야 함

            # -----------------------------------------
            # Step 2: Node.js 환경 설정
            # -----------------------------------------
            - name: Set up Node
              uses: actions/setup-node@v3
              with:
                node-version: '20'
              # - Node.js 20 버전 설치
              # - 현재는 Docker 내부에서 빌드하므로 직접 사용하지 않음
              # - 나중에 테스트 단계 추가 시 필요 (npm test)

            # -----------------------------------------
            # Step 3: DockerHub 로그인
            # -----------------------------------------
            - name: DockerHub Login
              uses: docker/login-action@v2
              with:
                username: ${{secrets.DOCKER_USERNAME}}
                password: ${{secrets.DOCKER_PASSWORD}}
              # - DockerHub에 로그인하여 이미지 push 권한 획득
              # - secrets: GitHub 저장소 Settings > Secrets에서 설정
              # - DOCKER_USERNAME: DockerHub 사용자명
              # - DOCKER_PASSWORD: DockerHub 비밀번호 또는 Access Token

            # -----------------------------------------
            # Step 4: Docker 이미지 빌드 및 푸시
            # -----------------------------------------
            - name: Build and Push Docker Image
              run: |
                IMAGE_NAME=${{secrets.DOCKER_USERNAME}}/my-app
                TAG=${{github.sha}}
                
                # 추가한 내용
                # .env.production 파일 생성 (gitignore에서 제외되어 있으므로)
                # REACT_APP_API_BASE_URL : http://54.116.190.160:8080

                echo "REACT_APP_API_BASE_URL=${{secrets.REACT_APP_API_BASE_URL}}" > .env.production

                docker build -t $IMAGE_NAME:$TAG .
                docker push $IMAGE_NAME:$TAG
              # - IMAGE_NAME: DockerHub 저장소 경로 (username/my-app03)
              # - TAG: Git 커밋 SHA (고유한 버전 식별자)
              #   예: abc123def456...
              # - docker build: Dockerfile을 사용하여 이미지 생성
              # - docker push: DockerHub에 이미지 업로드

            # -----------------------------------------
            # Step 5: AWS EC2 서버에 배포
            # -----------------------------------------
            - name: Deploy to AWS EC2
              uses: appleboy/ssh-action@v0.1.8
              # - SSH를 통해 원격 서버에 명령 실행
              # - appleboy/ssh-action: 커뮤니티에서 많이 사용하는 SSH 액션
              with:
                host: ${{secrets.AWS_EC2_HOST}}
                # - EC2 인스턴스의 퍼블릭 IP 또는 도메인
                username: ${{secrets.AWS_EC2_USER_NAME}}
                # - SSH 접속 사용자명 (보통 ec2-user 또는 ubuntu)
                key: ${{secrets.AWS_EC2_PRIVATE_KEY}}
                # - EC2 접속용 SSH 프라이빗 키 (.pem 파일 내용)
                script: |
                    docker pull ${{secrets.DOCKER_USERNAME}}/my-app:${{github.sha}}
                    docker stop my-app || true
                    docker rm my-app || true
                    docker run -d -p 80:80 --name my-app ${{secrets.DOCKER_USERNAME}}/my-app:${{github.sha}}
              # EC2에서 실행되는 배포 스크립트:
              # 1. docker pull: DockerHub에서 새 이미지 다운로드
              # 2. docker stop: 기존 컨테이너 중지 (없으면 무시: || true)
              # 3. docker rm: 기존 컨테이너 삭제 (없으면 무시: || true)
              # 4. docker run: 새 컨테이너 실행
              #    -d: 백그라운드 실행 (detached)
              #    -p 80:80: 호스트 80포트 → 컨테이너 80포트 매핑
              #    --name my-app03: 컨테이너 이름 지정
